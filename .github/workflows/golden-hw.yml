# Install golden stack on self-hosted runners, verify versions, stress-test tt-smi reset,
# ttnn unit test (tt-metalium release), and metal upstream (upstream-tests-bh).
# Runners mirror tenstorrent/tt-smi/.github/workflows/test.yml (test-hardware job).
#
# Runs on push to main / renovate/**, PRs touching golden files, workflow_dispatch,
# or when called by golden-release.yml.
# Self-hosted runners may log "sudo: unable to resolve host ubuntu" when hostname is not in
# /etc/hosts — harmless. To silence: echo "127.0.0.1 ubuntu" | sudo tee -a /etc/hosts
name: Golden — hardware
run-name: Golden hw · ${{ github.event_name }}

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:
    paths:
      - golden.json
      - .github/workflows/golden-ttis.yml
      - .github/workflows/golden-hw.yml
      - .github/workflows/golden-release.yml
      - .github/workflows/renovate.yml
      - .github/scripts/**
      - tests/metalium-workload.py
  workflow_dispatch:
    inputs:
      reason:
        description: Why you are running this workflow (optional)
        required: false
        type: string
  workflow_call:

concurrency:
  group: golden-hw-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  golden-hw-integration:
    name: Golden hw (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - p100a # syseng-gh-01
          - p150a # syseng-gh-03

    steps:
      - name: Checkout golden versions repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install golden stack (tt-installer)
        env:
          GOLDEN_JSON: ${{ github.workspace }}/golden.json
        run: |
          for i in {1..60}; do
            sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || break
            echo "Waiting for apt lock..."
            sleep 5
          done
          sudo env GOLDEN_JSON="${GOLDEN_JSON}" bash .github/scripts/golden-install.sh --hw

      - name: Verify installed smi matches golden.json
        env:
          GOLDEN_JSON: ${{ github.workspace }}/golden.json
          VENV_DIR: /root/.tenstorrent-venv
        run: sudo -E env GOLDEN_JSON="${GOLDEN_JSON}" VENV_DIR="${VENV_DIR}" bash .github/scripts/verify-versions.sh

      - name: PCI reset stress (10x, installer tt-smi)
        env:
          VENV_DIR: /root/.tenstorrent-venv
          NUM_RESETS: "10"
        run: sudo -E env VENV_DIR="${VENV_DIR}" NUM_RESETS="${NUM_RESETS}" bash .github/scripts/smi-reset.sh

      - name: TTNN unit test (tt-metalium release container)
        timeout-minutes: 30
        env:
          GOLDEN_JSON: ${{ github.workspace }}/golden.json
          GOLDEN_RUNNER_LABEL: ${{ matrix.runner }}
        run: |
          sudo -E env \
            GOLDEN_JSON="${GOLDEN_JSON}" \
            GOLDEN_RUNNER_LABEL="${GOLDEN_RUNNER_LABEL}" \
            GITHUB_RUNNER_NAME="${GITHUB_RUNNER_NAME}" \
            bash .github/scripts/ttnn-unit-test.sh

      #  Commenting this out for now - this will depend on the type of runner
