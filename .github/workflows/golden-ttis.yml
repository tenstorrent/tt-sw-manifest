# Install the golden.json stack in each distro container (no hardware), capture
# the installed versions with tt-installer --export-schema into a per-distro
# .ttis file, and verify it.
#
# The exported .ttis is the release artifact: tenstorrent-tools and sfpi versions
# come from what actually installed; firmware is recorded from golden.json as
# assumed-flashed (CI has no device to flash). Publishing is manual via golden-release.yml.
name: Golden — ttis
run-name: Golden ttis · ${{ github.event_name }}

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:
    paths:
      - golden.json
      - .github/workflows/golden-ttis.yml
      - .github/workflows/golden-hw.yml
      - .github/workflows/golden-release.yml
      - .github/workflows/renovate.yml
      - .github/scripts/**
      - tests/metalium-workload.py
  workflow_dispatch:
  workflow_call:

concurrency:
  group: golden-ttis-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Install + export + test (${{ matrix.slug }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: "ubuntu:22.04", slug: "ubuntu-22.04" }
          - { image: "ubuntu:24.04", slug: "ubuntu-24.04" }
          - { image: "debian:13", slug: "debian-13" }
          - { image: "fedora:43", slug: "fedora-43" }

    steps:
      - name: Checkout golden versions repo
        uses: actions/checkout@v4

      - name: Install + export + test .ttis in ${{ matrix.image }}
        env:
          # TEMP: the schema feature (install.sh --import-schema + ttis.sh) and the
          # uv-venv Python provisioning are only in a fork release for now.
          # INSTALLER_TAG must point at the release that contains BOTH — i.e. the
          # one cut after backporting the install.m4/ttis.sh uv-venv changes.
          # Delete this block once tenstorrent/tt-installer releases them; the
          # scripts then default to tenstorrent/tt-installer at golden.json's pin.
          INSTALLER_REPO: tenstorrent/tt-installer
          INSTALLER_TAG: v3.1.0
          SKIP_INSTALLER_VERSION_CHECK: "1"
        run: |
          docker run --rm \
            -e INSTALLER_REPO -e INSTALLER_TAG -e SKIP_INSTALLER_VERSION_CHECK \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${{ matrix.image }}" \
            bash /workspace/.github/scripts/ci-container-bootstrap.sh

      - name: Upload exported .ttis
        uses: actions/upload-artifact@v4
        with:
          name: ttis-${{ matrix.slug }}
          path: dist/*.ttis
          if-no-files-found: error
