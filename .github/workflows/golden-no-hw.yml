# Install stack from golden.json via tt-installer (no device required).
# Pattern follows tenstorrent/tt-installer/.github/workflows/test-debian-ubuntu.yml
name: Golden — no hardware
run-name: Golden no-hw · ${{ github.event_name }}

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:
    paths:
      - golden.json
      - .github/workflows/golden-no-hw.yml
      - .github/workflows/golden-hw.yml
      - .github/workflows/renovate.yml
      - .github/scripts/**
      - tests/metalium-workload.py
  workflow_dispatch:

concurrency:
  group: golden-no-hw-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-and-verify:
    name: Install via tt-installer and verify versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:22.04

    steps:
      - name: Checkout golden versions repo
        uses: actions/checkout@v4

      - name: Run install + version check in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ matrix.distro }} \
            bash -euxo pipefail -c "
              apt-get update
              apt-get install -y git python3-pip jq curl sudo ca-certificates

              useradd -m -s /bin/bash testuser
              echo 'testuser ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/testuser

              cp -r /workspace /home/testuser/workspace
              chown -R testuser:testuser /home/testuser/workspace

              su - testuser -c '
                set -euo pipefail
                cd /home/testuser/workspace
                export GOLDEN_JSON=/home/testuser/workspace/golden.json

                bash .github/scripts/golden-install.sh
                bash .github/scripts/verify-versions.sh
              '
            "
