# Golden validation for pinned Tenstorrent stack versions in golden.json.
#
# No-hardware jobs follow patterns from:
#   - ../tt-installer/.github/workflows/test-debian-ubuntu.yml (installer in container)
#   - ../tt-smi/.github/workflows/test.yml (split no-hw vs hardware; hardware TBD)
name: Golden
run-name: >-
  Golden · ${{ github.event_name }}${{
    (github.event_name == 'workflow_dispatch' && inputs.run_hardware_tests) ||
    (github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    && ' · HW' || '' }}

on:
  push:
    branches:
      - main
      # Renovate pushes here first; Golden runs on the branch before/while the PR is open.
      - renovate/**
  pull_request:
    paths:
      - golden.json
      - .github/workflows/golden*.yml
      - .github/workflows/renovate.yml
      - .github/scripts/**
      - .github/golden-metal-boards.json
      - tests/metalium-workload.py
  workflow_dispatch:
    inputs:
      run_hardware_tests:
        description: Run hardware tests on self-hosted runners (n150 / p150b)
        required: false
        type: boolean
        default: false
      reason:
        description: Why you are running this workflow (optional)
        required: false
        type: string

concurrency:
  group: golden-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-hw-install-verify:
    name: No hardware — install & verify versions
    uses: ./.github/workflows/golden-no-hw.yml

  hw-integration:
    name: Hardware — install, smi stress, metal unit + upstream (n150 / p150)
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_hardware_tests) ||
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    uses: ./.github/workflows/golden-hw.yml
