# Manual release gate: re-run no-hardware (ttis) + hardware validation, then publish
# golden.json (with test-sha) and per-distro .ttis files as a GitHub Release.
#
# Dispatch from main after golden.json changes have merged and routine CI is green.
name: Golden — release
run-name: Golden release · ${{ github.event_name }}

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why you are cutting a release (optional)
        required: false
        type: string

concurrency:
  group: golden-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ttis:
    name: No-hardware validation
    uses: ./.github/workflows/golden-ttis.yml

  hw:
    name: Hardware validation
    uses: ./.github/workflows/golden-hw.yml

  release:
    name: Publish golden release
    needs: [ttis, hw]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download exported .ttis files
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ttis-*
          merge-multiple: true

      - name: Assemble release payload
        env:
          TEST_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.ttis' -exec cp -t release/ {} +
          jq --arg sha "${TEST_SHA}" '. + {"test-sha": $sha}' golden.json > release/golden.json
          echo "Release payload:"
          ls -1 release
          jq . release/golden.json

      - name: Derive release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BASE="v$(date -u +%Y.%m.%d)"
          SUFFIX=0
          TAG="${BASE}"
          while gh release view "${TAG}" >/dev/null 2>&1; do
            SUFFIX=$((SUFFIX + 1))
            TAG="${BASE}-${SUFFIX}"
          done
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Release tag: ${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Golden versions ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            release/golden.json
            release/*.ttis
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
